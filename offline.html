<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeProjectIQ — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Geist', system-ui, sans-serif; background: #F7F5F2; color: #2C2C2C; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
    .container { max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 28px; margin-bottom: 12px; color: #C05E14; }
    p { font-size: 16px; color: #6B6B6B; line-height: 1.6; margin-bottom: 24px; }
    button { background: #C05E14; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏠</div>
    <h1>You're Offline</h1>
    <p>HomeProjectIQ needs an internet connection to load your projects. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>

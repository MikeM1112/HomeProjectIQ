<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- House-shaped head -->
  <path d="M16 3.5 L27 12 L27 22 Q27 27 22 27 L10 27 Q5 27 5 22 L5 12 Z" fill="#0F3D6B"/>
  <!-- 3D sheen -->
  <path d="M16 3.5 L27 12 L27 22 Q27 27 22 27 L10 27 Q5 27 5 22 L5 12 Z" fill="url(#fs)" opacity="0.2"/>
  <!-- Visor -->
  <rect x="8" y="13.5" width="16" height="11" rx="4.5" fill="#FFFFFF" opacity="0.95"/>
  <!-- Left eye -->
  <circle cx="13" cy="18" r="2.8" fill="#00E5FF"/>
  <circle cx="12" cy="17" r="1" fill="#FFFFFF" opacity="0.85"/>
  <!-- Right eye -->
  <circle cx="19" cy="18" r="2.8" fill="#00E5FF"/>
  <circle cx="18" cy="17" r="1" fill="#FFFFFF" opacity="0.85"/>
  <!-- Smile -->
  <path d="M13.5 22 Q16 24.5 18.5 22" stroke="#00D4FF" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- Left antenna -->
  <line x1="10.5" y1="7.5" x2="7" y2="2" stroke="#1B5588" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="7" cy="1.5" r="2" fill="#00E5FF"/>
  <circle cx="10.5" cy="8" r="1.5" fill="#00E5FF"/>
  <!-- Right antenna -->
  <line x1="21.5" y1="7.5" x2="25" y2="2" stroke="#1B5588" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="25" cy="1.5" r="2" fill="#00E5FF"/>
  <circle cx="21.5" cy="8" r="1.5" fill="#00E5FF"/>
  <defs>
    <linearGradient id="fs" x1="5" y1="3" x2="20" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>

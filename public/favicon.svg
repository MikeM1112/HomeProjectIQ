<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1A7FE8"/>

  <!-- Robot head -->
  <rect x="7" y="11" width="18" height="15" rx="3.5" ry="3.5" fill="#2A7DE1" stroke="#1565C0" stroke-width="0.6"/>

  <!-- Hardhat brim -->
  <ellipse cx="16" cy="12" rx="11" ry="1.5" fill="#E5A700"/>
  <!-- Hardhat dome -->
  <path d="M7.5 12 Q8 6 16 5.5 Q24 6 24.5 12 Z" fill="#FBBF24" stroke="#E5A700" stroke-width="0.4"/>
  <!-- Hardhat ridge -->
  <line x1="16" y1="5.8" x2="16" y2="12" stroke="#E5A700" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Left eye socket -->
  <rect x="9.5" y="14.5" width="5" height="3.8" rx="1.2" fill="#0A1628"/>
  <!-- Right eye socket -->
  <rect x="17.5" y="14.5" width="5" height="3.8" rx="1.2" fill="#0A1628"/>

  <!-- Left eye pupil -->
  <circle cx="12.2" cy="16.4" r="1.3" fill="#E0F0FF"/>
  <circle cx="12.5" cy="16.1" r="0.5" fill="#FFFFFF"/>
  <!-- Right eye pupil -->
  <circle cx="20.2" cy="16.4" r="1.3" fill="#E0F0FF"/>
  <circle cx="20.5" cy="16.1" r="0.5" fill="#FFFFFF"/>

  <!-- Mouth -->
  <path d="M12 22 Q14 24 16 24 Q18 24 20 22" stroke="#E0F0FF" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Antenna -->
  <circle cx="16" cy="4" r="1.2" fill="#3B9EFF"/>

  <!-- Ear bolts -->
  <circle cx="6" cy="18" r="1.4" fill="#2A7DE1" stroke="#1565C0" stroke-width="0.4"/>
  <circle cx="26" cy="18" r="1.4" fill="#2A7DE1" stroke="#1565C0" stroke-width="0.4"/>
</svg>
